name: 自动合并订阅文件

on:
  # 每天自动运行（北京时间早上 8 点）
  schedule:
    - cron: '0 0 * * *'     # UTC 0点 = 北京时间早上8点
  
  # 支持手动触发
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（无额外依赖，仅防万一）
        run: |
          python -m pip install --upgrade pip

      - name: 执行合并脚本
        run: |
          python merge_sources.py

      - name: 检查是否有文件更新
        id: git-check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet outputs/merged_subscriptions.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 订阅内容无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📤 检测到订阅更新，准备提交"
          fi

      - name: 提交并推送更新
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git add outputs/merged_subscriptions.txt
          git commit -m "🔄 自动更新合并订阅文件 (GitHub Actions)"
          git push
